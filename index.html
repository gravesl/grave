<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>‎ ‎ ‎ </title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="97dec4d0-9d42-440f-b6e6-7a01ee430d83.png">

  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding-top: 100px;
      background: black;
      color: red;
      text-shadow: 1px 1px 1px black;
      font-family: 'UnifrakturMaguntia', cursive;
      text-align: center;
      overflow-x: hidden;
      user-select: none;
    }

    .arc-title {
      font-size: 30px;
      animation: pulseRed 2s infinite;
      text-shadow: 0 0 2px white, 0 0 10px red;
    }

    .names {
      margin-top: 80px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 22px;
      cursor: pointer;
    }

    .names span {
      transition: opacity 0.3s ease;
    }

    .names span:hover {
      opacity: 0.6;
    }

    .profile {
      display: none;
      margin-top: 60px;
      animation: fadeIn 1s forwards;
    }

    .profile img {
      width: 200px;
      border-radius: 8px;
      border: 2px solid black;
    }

    .profile h2, .profile p {
      margin: 10px 0;
      color: red;
      font-family: monospace;
    }

    .skull {
      margin-top: 60px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .skull:hover {
      transform: scale(1.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .snow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .snowflake {
      position: absolute;
      top: -10px;
      color: red;
      font-size: 1em;
      user-select: none;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(0); }
      100% { transform: translateY(100vh); }
    }

    @keyframes pulseRed {
      0% { text-shadow: 0 0 5px red, 0 0 10px red; }
      50% { text-shadow: 0 0 15px red, 0 0 25px red; }
      100% { text-shadow: 0 0 5px red, 0 0 10px red; }
    }

    .music-bar {
      display: none;
      position: fixed;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid red;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 11px;
      text-align: left;
      z-index: 9000;
      max-width: 160px;
    }

    .track {
      cursor: pointer;
      margin: 4px 0;
      opacity: 0.6;
      transition: opacity 0.2s ease, transform 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track:hover {
      opacity: 1;
      transform: translateX(2px);
    }

    .track.active {
      opacity: 1;
      text-shadow: 0 0 8px red;
    }

    .player { margin: 40px auto 0; max-width: 420px; text-align: center; font-family: monospace; }

    .player-wave { display: flex; justify-content: center; gap: 3px; margin-bottom: 14px; height: 30px; align-items: flex-end; }

    .player-wave .bar { width: 3px; height: 8px; background: red; opacity: 0.5; border-radius: 2px; }

    .player.playing .bar { animation: equalize 0.8s infinite ease-in-out; }

    @keyframes equalize {
      0%, 100% { height: 6px; opacity: 0.4; }
      50%      { height: 28px; opacity: 1; }
    }

    #progress-bar { flex: 1; height: 4px; background: #330000; border-radius: 999px; overflow: hidden; cursor: pointer; }

    #progress-fill { height: 100%; width: 0%; background: red; }

    #welcome-overlay {
      position: fixed;
      inset: 0;
      background: black;
      color: red;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    #welcome-overlay.hidden { display: none; }
  </style>
</head>
<body>

<div id="welcome-overlay">
  <img id="welcome-logo" src="https://media.istockphoto.com/id/1321281110/vector/red-skull-digital-logic-zero-and-one-number-for-virus-security-abstract-vector-design.jpg">
  <button id="welcome-enter">enter</button>
</div>

<div class="music-bar">
  <div class="track active" data-src="music/chainsaw_murda.mp3">chainsaw</div>
  <div class="track" data-src="music/grezy.mp3">grezy</div>
</div> <!-- FIXED -->

<img id="music-skull" class="skull" src="https://i.pinimg.com/736x/45/74/22/4574220bdb8ec123f1443478b98b733c.jpg" width="100">

<div class="names">
  <span onclick="showProfile('ɠrave')">ɠrave</span>
  <span onclick="showProfile('rain')">rain</span>
</div>

<div id="ɠrave" class="profile"><h2>ɠrave</h2></div>
<div id="rain" class="profile"><h2>rain</h2></div>

<div class="snow"></div>

<script>
function showProfile(id) {
  document.querySelectorAll('.profile').forEach(p => p.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

const snowContainer = document.querySelector('.snow');
for (let i = 0; i < 80; i++) {
  const flake = document.createElement('div');
  flake.classList.add('snowflake');
  flake.style.left = Math.random() * 100 + 'vw';
  flake.style.animationDuration = 5 + Math.random() * 5 + 's';
  flake.textContent = '*';
  snowContainer.appendChild(flake);
}
</script>

<audio id="bg-music" src="music/chainsaw_murda.mp3"></audio>

<script>
const bgMusic = document.getElementById('bg-music');
const skull = document.getElementById('music-skull');
const welcomeOverlay = document.getElementById('welcome-overlay');
const welcomeEnter = document.getElementById('welcome-enter');

skull.onclick = () => bgMusic.paused ? bgMusic.play() : bgMusic.pause();

welcomeEnter.onclick = () => {
  welcomeOverlay.classList.add('hidden');
  bgMusic.play();
};
</script>

</body>
</html>
